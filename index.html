<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Playdiom</title>
    <style>
        :root {
            --primary-green: #00a884;
            --dark-bg: #075e54;
            --light-gray: #f0f4f3;
            --white: #ffffff;
            --text-dark: #2c3e50;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: #dff4ea; margin: 0; padding: 20px; display: flex; justify-content: center; }

        .admin-container { width: 100%; max-width: 1200px; background: #ecfdf5; padding: 30px; border-radius: 28px; box-shadow: 0 18px 45px rgba(0,0,0,0.08); border: 1px solid rgba(0,120,90,0.15); }

        h1 { color: var(--dark-bg); font-size: 2.1rem; margin: 0 0 10px; font-weight: 800; }
        .dashboard-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 22px; }
        .dashboard-header .subtext { margin: 0; color: #215844; font-size: 0.95rem; }

        .cards-row { display: grid; grid-template-columns: repeat(2, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .card-summary { background: linear-gradient(135deg, #f2fff8, #ddf7e7); border: 1px solid #c3e8d3; border-radius: 22px; padding: 20px 20px 18px; box-shadow: 0 12px 26px rgba(0,0,0,0.04); }
        .card-summary:first-child { background: linear-gradient(135deg, #e8fff5, #cdefde); }
        .card-summary:nth-child(2) { background: linear-gradient(135deg, #fffff7, #eaf7e7); }
        .card-summary .card-label { display: block; font-size: 0.92rem; color: #1a5f4f; margin-bottom: 8px; }
        .card-summary .card-value { font-size: 1.8rem; font-weight: 800; color: var(--dark-bg); }
        .card-summary .card-note { margin-top: 10px; font-size: 0.85rem; color: #3f6f5f; }

        .update-widget { display: inline-flex; flex-direction: column; align-items: flex-end; justify-content: center; gap: 2px; padding: 10px 14px; background: rgba(0, 168, 132, 0.14); border: 1px solid #9adeca; border-radius: 999px; min-width: 160px; max-width: 220px; }
        .update-widget .update-label { font-size: 0.78rem; color: #1d5d49; opacity: 0.9; }
        .update-widget .update-value { font-size: 1rem; font-weight: 700; color: var(--dark-bg); }
        .update-widget .update-note { font-size: 0.72rem; color: #3c6e60; opacity: 0.85; line-height: 1.1; }

        .controls-row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .controls-left { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .controls-left input,
        .controls-left select { min-width: 220px; padding: 12px 14px; border: 1.4px solid #badcc9; border-radius: 14px; background: #f7fff8; color: #364a45; }
        .controls-left input:focus,
        .controls-left select:focus { outline: none; border-color: var(--primary-green); }
        .table-actions { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
        .btn-small { padding: 10px 14px; border-radius: 14px; border: none; cursor: pointer; font-weight: 700; transition: 0.2s; }
        .btn-small.primary { background: var(--primary-green); color: white; }
        .btn-small.secondary { background: white; color: var(--dark-bg); border: 1px solid #c6e1d8; }
        .btn-small.ghost { background: transparent; color: var(--dark-bg); border: 1px solid transparent; }
        .btn-small:hover { transform: translateY(-1px); }

        .status-message { display: none; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 16px; border-radius: 16px; margin-bottom: 16px; font-size: 0.95rem; }
        .status-message.show { display: flex; }
        .status-message.success { background: rgba(2, 118, 83, 0.12); color: #08563c; border: 1px solid #86d2b4; }
        .status-message.error { background: rgba(153, 27, 27, 0.12); color: #7a1e1e; border: 1px solid #edb7b7; }
        .status-message span { flex: 1; }
        .status-message button { border: none; background: transparent; color: inherit; cursor: pointer; font-weight: 700; }

        .loading-overlay { display: none; position: absolute; inset: 0; background: rgba(255,255,255,0.75); align-items: center; justify-content: center; z-index: 5; border-radius: 24px; }
        .loading-overlay.show { display: flex; }
        .loading-spinner { width: 44px; height: 44px; border: 4px solid rgba(0,0,0,0.08); border-top-color: var(--primary-green); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .sort-header { cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .sort-header::after { content: '\2191'; font-size: 0.7rem; opacity: 0.35; transform: scaleY(-1); transition: transform 0.2s ease, opacity 0.2s ease; }
        .sort-header.sorted.asc::after { content: '\2191'; opacity: 1; transform: scaleY(-1); }
        .sort-header.sorted.desc::after { content: '\2193'; opacity: 1; }

        .no-data-row td { padding: 24px 0; color: #4d6a5f; font-style: italic; }

        .stats-row { display: grid; grid-template-columns: 1.5fr 1fr; gap: 16px; margin-bottom: 24px; }
        .stats-card { background: linear-gradient(180deg, #ffffff, #ecfff7); border: 1px solid #bfe6d3; border-radius: 24px; padding: 22px; box-shadow: 0 14px 30px rgba(0,0,0,0.05); }
        .stat-title { display: block; margin-bottom: 16px; color: var(--dark-bg); font-size: 1rem; font-weight: 700; }
        .country-bars .stat-line { display: grid; grid-template-columns: 1.25fr 2fr; align-items: center; gap: 12px; margin-bottom: 14px; }
        .country-bars .stat-country { color: #526a63; font-size: 0.9rem; font-weight: 600; }
        .country-bars .bar-track { width: 100%; height: 10px; background: #e9f6f1; border-radius: 999px; overflow: hidden; }
        .country-bars .bar-fill { height: 100%; background: linear-gradient(90deg, #00a884, #075e54); border-radius: 999px; }
        .chart-info .metric-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; color: #526a63; font-size: 0.92rem; }
        .chart-info .metric-row strong { color: #213b32; font-size: 1rem; }
        .progress-row { margin-top: 18px; }
        .progress-row span { display: block; color: #526a63; font-size: 0.9rem; margin-bottom: 8px; }
        .progress-track { width: 100%; height: 14px; background: #eaf7f1; border-radius: 999px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #00a884, #075e54); transition: width 0.3s ease; }
        .progress-label { text-align: right; color: #2c4e44; font-size: 0.88rem; margin-top: 8px; }

        .panel-section { position: relative; background: linear-gradient(180deg, #f7fff8, #eaf9ee); border: 1px solid #c7e8d7; border-radius: 24px; padding: 24px; margin-bottom: 24px; }
        .section-title { display: block; margin-bottom: 18px; color: var(--dark-bg); font-size: 1.05rem; font-weight: 700; }

        .table-wrapper { overflow-x: auto; margin-bottom: 0; }
        .table-wrapper tbody td::before { display: none; }
        table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 800px; background: transparent; }
        thead th { background-color: var(--primary-green); color: #ffffff; padding: 16px 14px; font-size: 0.80rem; text-transform: uppercase; letter-spacing: 0.06em; border: none; position: sticky; top: 0; }
        thead th:first-child { border-top-left-radius: 18px; }
        thead th:last-child { border-top-right-radius: 18px; }
        tbody tr { background: #ffffff; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        tbody tr:nth-child(even) { background: #f4fbf8; }
        tbody tr:hover { transform: translateY(-1px); box-shadow: 0 10px 20px rgba(0,0,0,0.04); }
        td { padding: 14px; border-bottom: 1px solid #e9f3ef; text-align: center; font-size: 0.92rem; color: #425450; }

        #paginationContainer { display: none; justify-content: center; align-items: center; gap: 12px; margin: 20px 0 0; }
        .page-btn { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; background: white; color: var(--primary-green); border: 1px solid var(--primary-green); border-radius: 50%; cursor: pointer; font-size: 1rem; transition: 0.25s; }
        .page-btn:hover:not(:disabled) { background: var(--primary-green); color: white; }
        .page-btn:disabled { border-color: #c4d7d0; color: #c4d7d0; cursor: not-allowed; }
        #pageInfo { font-size: 0.88rem; font-weight: 600; color: var(--dark-bg); }
        .form-note { margin: 0 auto 18px auto; font-size: 1rem; color: var(--dark-bg); font-weight: 700; text-align: center; }

        .btn-action { padding: 7px 10px; border: none; border-radius: 8px; cursor: pointer; font-size: 0.82rem; transition: 0.2s; margin: 0 2px; }
        .edit { background-color: #ffefc4; color: #8a6f22; }
        .delete { background-color: #f7d5da; color: #8c1c2e; }
        .btn-action:hover { transform: scale(1.05); }

        .form-card { background: linear-gradient(180deg, #f2fff7, #e2f9ea); border: 1px solid #bfe5d3; border-radius: 24px; padding: 26px; box-shadow: 0 18px 35px rgba(0,0,0,0.05); }
        .grid-form { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px 24px; margin-top: 0; padding: 0; background: transparent; }
        input { padding: 14px; border: 1.4px solid #badcc9; border-radius: 14px; outline: none; font-size: 0.95rem; color: #364a45; background: #f7fff8; }
        input.invalid { border-color: #e27d7d; box-shadow: 0 0 0 3px rgba(226, 125, 125, 0.12); }
        .actions-row { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; grid-column: span 2; margin-top: 14px; }
        input:focus { border-color: var(--primary-green); background: #ffffff; }
        .btn-submit { width: auto; min-width: 240px; background-color: var(--primary-green); color: white; padding: 15px 30px; border: none; border-radius: 14px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .btn-small.secondary { min-width: 120px; }
        .btn-submit:hover { background-color: var(--dark-bg); }

        @media (max-width: 900px) {
            body { padding: 14px; }
            .admin-container { padding: 24px; }
            .dashboard-header { flex-direction: column; align-items: stretch; }
            .dashboard-header > div { width: 100%; }
            .cards-row, .stats-row { grid-template-columns: 1fr; }
            .cards-row { gap: 14px; }
            .stats-row { gap: 14px; }
            .controls-row { flex-direction: column; align-items: stretch; gap: 14px; }
            .controls-left { flex-direction: column; width: 100%; }
            .controls-left input, .controls-left select { min-width: 100%; width: 100%; }
            .table-actions { justify-content: flex-start; width: 100%; flex-wrap: wrap; }
            .table-actions select, .table-actions .btn-small { min-width: 120px; width: auto; }
            .panel-section { padding: 20px; }
            .form-card { padding: 22px; }
            .actions-row { justify-content: stretch; }
            .btn-small, .btn-submit { width: 100%; min-width: 0; }
            .btn-submit { padding: 14px 16px; }
        }

        @media (max-width: 680px) {
            .admin-container { border-radius: 22px; }
            .card-summary, .stats-card, .panel-section, .form-card { padding: 18px; }
            .dashboard-header { gap: 12px; }
            .dashboard-header h1 { font-size: 1.8rem; }
            .subtext { font-size: 0.92rem; }
            .controls-left input, .controls-left select, .table-actions select { font-size: 0.95rem; }
            .table-wrapper { margin-bottom: 16px; }
            table { min-width: 0; }
            thead th, td { padding: 12px 10px; font-size: 0.82rem; text-align: left; }
            thead th:first-child, thead th:last-child { border-radius: 0; }
            tbody tr { display: block; margin-bottom: 14px; border-radius: 18px; box-shadow: 0 12px 24px rgba(0,0,0,0.05); }
            tbody tr td { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e9f3ef; }
            tbody tr td:last-child { border-bottom: none; }
            tbody tr td::before { content: attr(data-label); flex: 1; color: #5a7a70; font-weight: 700; margin-right: 8px; }
            tbody tr td:nth-child(1)::before { content: "ID"; }
            tbody tr td:nth-child(2)::before { content: "Nombre"; }
            tbody tr td:nth-child(3)::before { content: "Apellidos"; }
            tbody tr td:nth-child(4)::before { content: "Correo"; }
            tbody tr td:nth-child(5)::before { content: "Ciudad"; }
            tbody tr td:nth-child(6)::before { content: "País"; }
            tbody tr td:nth-child(7)::before { content: "Tel"; }
            tbody tr td:nth-child(8)::before { content: "Acciones"; }
            .stat-country { font-size: 0.82rem; }
            .metric-row { flex-direction: column; align-items: flex-start; gap: 4px; }
            .progress-label { text-align: left; }
        }
    </style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
<script src="https://unpkg.com/docx@6.0.3/build/index.js"></script>

<script type="text/babel">
const { useState, useEffect, useMemo, useRef } = React;
const API = "https://curso-ia-back-cursos-ia.nsueba.easypanel.host/api/Docentes";
const registrosPorPagina = 15;
const emptyForm = { id: "", nombres: "", apellidos: "", correo: "", ciudad: "", pais: "", telefono: "" };

function AdminPanel() {
    const [docentes, setDocentes] = useState([]);
    const [search, setSearch] = useState("");
    const [country, setCountry] = useState("all");
    const [page, setPage] = useState(1);
    const [sortColumn, setSortColumn] = useState("id");
    const [sortDirection, setSortDirection] = useState(1);
    const [loading, setLoading] = useState(false);
    const [message, setMessage] = useState({ text: "Bienvenido, los datos se actualizarán automáticamente.", type: "success", visible: true });
    const [formData, setFormData] = useState({ ...emptyForm });
    const [editing, setEditing] = useState(false);
    const [invalidFields, setInvalidFields] = useState({});
    const timerRef = useRef(null);

    const countries = useMemo(() => {
        return [...new Set(docentes.map(d => d.pais?.trim() || "Sin país"))].sort((a, b) => a.localeCompare(b, "es", { numeric: true }));
    }, [docentes]);

    const filteredData = useMemo(() => {
        return docentes.filter(d => {
            const text = `${d.nombres} ${d.apellidos} ${d.correo} ${d.ciudad} ${d.pais}`.toLowerCase();
            const query = search.toLowerCase();
            const matchesSearch = !query || text.includes(query);
            const matchesCountry = country === "all" || (d.pais?.trim() === country);
            return matchesSearch && matchesCountry;
        });
    }, [docentes, search, country]);

    const sortedData = useMemo(() => {
        return [...filteredData].sort((a, b) => {
            const va = a[sortColumn] || "";
            const vb = b[sortColumn] || "";
            if (sortColumn === "id") {
                return sortDirection * (Number(va) - Number(vb));
            }
            return sortDirection * String(va).localeCompare(String(vb), "es", { numeric: true });
        });
    }, [filteredData, sortColumn, sortDirection]);

    const totalPages = Math.max(1, Math.ceil(sortedData.length / registrosPorPagina));
    const currentPageData = sortedData.slice((page - 1) * registrosPorPagina, page * registrosPorPagina);
    const progressFill = sortedData.length === 0 ? 0 : Math.round((currentPageData.length / registrosPorPagina) * 100);
    const ultimaActualizacion = new Date().toLocaleString("es-ES", { hour12: false });

    useEffect(() => {
        cargarDocentes();
        return () => clearTimeout(timerRef.current);
    }, []);

    useEffect(() => {
        setPage(1);
    }, [search, country]);

    useEffect(() => {
        if (page > totalPages) {
            setPage(totalPages);
        }
    }, [page, totalPages]);

    function showMessage(text, type = "success") {
        clearTimeout(timerRef.current);
        setMessage({ text, type, visible: true });
        timerRef.current = setTimeout(() => setMessage(prev => ({ ...prev, visible: false })), 4000);
    }

    function cargarDocentes() {
        setLoading(true);
        fetch(API)
            .then(res => res.json())
            .then(data => {
                setDocentes(Array.isArray(data) ? data : []);
                showMessage("Datos cargados correctamente.", "success");
            })
            .catch(() => showMessage("Error cargando datos de la API.", "error"))
            .finally(() => setLoading(false));
    }

    function validateForm() {
        const errors = {};
        if (!formData.nombres.trim()) errors.nombres = true;
        if (!formData.apellidos.trim()) errors.apellidos = true;
        if (!formData.correo.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.correo.trim())) errors.correo = true;
        if (!formData.ciudad.trim()) errors.ciudad = true;
        if (!formData.pais.trim()) errors.pais = true;
        if (formData.telefono.trim() && !/^[0-9+()\-\.\s]*$/.test(formData.telefono.trim())) errors.telefono = true;
        setInvalidFields(errors);
        if (Object.keys(errors).length) {
            showMessage("Revisa los campos en rojo antes de guardar.", "error");
            return false;
        }
        return true;
    }

    function resetForm() {
        setFormData({ ...emptyForm });
        setEditing(false);
        setInvalidFields({});
    }

    function handleSort(column) {
        if (sortColumn === column) {
            setSortDirection(prev => prev * -1);
        } else {
            setSortColumn(column);
            setSortDirection(1);
        }
    }

    function handleSubmit(event) {
        event.preventDefault();
        if (!validateForm()) return;

        const payload = {
            nombres: formData.nombres.trim(),
            apellidos: formData.apellidos.trim(),
            correo: formData.correo.trim(),
            ciudad: formData.ciudad.trim(),
            pais: formData.pais.trim(),
            telefono: formData.telefono.trim() || "000",
            institucion: "N/A",
            cargo: "N/A",
            areaEnsenanza: "N/A",
            nivelEducativo: "N/A",
            aceptaComunicaciones: true
        };

        setLoading(true);
        const method = formData.id ? "PUT" : "POST";
        const url = formData.id ? `${API}/${formData.id}` : API;

        fetch(url, {
            method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        })
            .then(() => {
                showMessage(formData.id ? "Registro actualizado correctamente." : "Registro guardado correctamente.", "success");
                resetForm();
                cargarDocentes();
            })
            .catch(() => showMessage("Error al guardar el registro.", "error"))
            .finally(() => setLoading(false));
    }

    function handleEdit(docente) {
        setFormData({ ...docente, telefono: docente.telefono || "" });
        setEditing(true);
        showMessage("Cargando datos del registro para editar.", "success");
        window.scrollTo({ top: document.getElementById("formCard").offsetTop - 20, behavior: "smooth" });
    }

    function handleDelete(id) {
        if (!window.confirm("¿Eliminar este registro?")) return;
        setLoading(true);
        fetch(`${API}/${id}`, { method: "DELETE" })
            .then(() => {
                showMessage("Registro eliminado.", "success");
                cargarDocentes();
            })
            .catch(() => showMessage("No se pudo eliminar el registro.", "error"))
            .finally(() => setLoading(false));
    }

    function handleExport(format) {
        const data = sortedData;
        const headers = ["ID", "Nombre", "Apellidos", "Correo", "Ciudad", "País", "Teléfono"];
        const rows = data.map(d => [d.id, d.nombres, d.apellidos, d.correo, d.ciudad, d.pais, d.telefono || ""]);

        if (format === "csv") {
            const csv = [headers, ...rows].map(row => row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(",")).join("\n");
            const blob = new Blob([csv], { type: "text/csv" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "personas.csv";
            link.click();
            URL.revokeObjectURL(link.href);
            showMessage("Exportado CSV correctamente.", "success");
            return;
        }

        if (format === "xls") {
            const ws = XLSX.utils.aoa_to_sheet([headers, ...rows]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Personas");
            XLSX.writeFile(wb, "personas.xlsx");
            showMessage("Exportado XLS correctamente.", "success");
            return;
        }

        if (format === "pdf") {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Listado de Personas", 20, 20);
            doc.autoTable({ head: [headers], body: rows, startY: 30 });
            doc.save("personas.pdf");
            showMessage("Exportado PDF correctamente.", "success");
            return;
        }

        if (format === "word") {
            const { Document, Packer, Paragraph, Table, TableCell, TableRow } = window.docx;
            const tableRows = [
                new TableRow({ children: headers.map(h => new TableCell({ children: [new Paragraph(h)] })) }),
                ...rows.map(row => new TableRow({ children: row.map(cell => new TableCell({ children: [new Paragraph(String(cell))] })) }))
            ];
            const table = new Table({ rows: tableRows });
            const doc = new Document({ sections: [{ children: [new Paragraph("Listado de Personas"), table] }] });
            Packer.toBlob(doc)
                .then(blob => {
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = "personas.docx";
                    link.click();
                    URL.revokeObjectURL(link.href);
                    showMessage("Exportado Word correctamente.", "success");
                })
                .catch(() => showMessage("Error al exportar Word.", "error"));
        }
    }

    const headerClasses = col => `sort-header ${sortColumn === col ? `sorted ${sortDirection === 1 ? "asc" : "desc"}` : ""}`;

    return (
        <div className="admin-container">
            <div className="dashboard-header">
                <div>
                    <h1>Panel de Administración</h1>
                    <p className="subtext">Accede y gestiona los registros de docentes con tu paleta de colores.</p>
                </div>
                <div className="update-widget">
                    <span className="update-label">Última actualización</span>
                    <span className="update-value">{ultimaActualizacion}</span>
                    <span className="update-note">Fecha y hora de la carga</span>
                </div>
            </div>
            <div className="cards-row">
                <div className="card-summary">
                    <span className="card-label">Total docentes</span>
                    <span className="card-value">{docentes.length}</span>
                    <span className="card-note">Registros cargados desde la API</span>
                </div>
                <div className="card-summary">
                    <span className="card-label">Página actual</span>
                    <span className="card-value">{page}</span>
                    <span className="card-note">Muestra la página de la tabla activada</span>
                </div>
            </div>
            <div className="stats-row">
                <div className="stats-card">
                    <span className="stat-title">Distribución por país</span>
                    <div className="country-bars">
                        {(() => {
                            const counts = filteredData.reduce((acc, d) => {
                                const pais = d.pais?.trim() || "Sin país";
                                acc[pais] = (acc[pais] || 0) + 1;
                                return acc;
                            }, {});
                            const entries = Object.entries(counts).sort((a, b) => b[1] - a[1]).slice(0, 4);
                            if (!entries.length) {
                                return (
                                    <div className="stat-line">
                                        <span className="stat-country">Sin datos</span>
                                        <div className="bar-track"><div className="bar-fill" style={{ width: "0%" }}></div></div>
                                    </div>
                                );
                            }
                            const max = entries[0][1] || 1;
                            return entries.map(([pais, cantidad]) => {
                                const porcentaje = Math.round((cantidad / max) * 100);
                                return (
                                    <div className="stat-line" key={pais}>
                                        <span className="stat-country">{pais} ({cantidad})</span>
                                        <div className="bar-track"><div className="bar-fill" style={{ width: `${porcentaje}%` }}></div></div>
                                    </div>
                                );
                            });
                        })()}
                    </div>
                </div>
                <div className="stats-card">
                    <span className="stat-title">Actividad de la tabla</span>
                    <div className="chart-info">
                        <div className="metric-row"><span>Registros totales</span><strong>{filteredData.length}</strong></div>
                        <div className="metric-row"><span>Página actual</span><strong>{page}</strong></div>
                        <div className="metric-row"><span>Registros por página</span><strong>{registrosPorPagina}</strong></div>
                        <div className="progress-row">
                            <span>Ocupación de la página</span>
                            <div className="progress-track"><div className="progress-fill" style={{ width: `${progressFill}%` }}></div></div>
                            <span className="progress-label">{progressFill}%</span>
                        </div>
                    </div>
                </div>
            </div>
            <div className="panel-section">
                <span className="section-title">Listado de personas</span>
                {message.visible && (
                    <div className={`status-message show ${message.type}`}>
                        <span>{message.text}</span>
                        <button type="button" onClick={() => setMessage(prev => ({ ...prev, visible: false }))}>Cerrar</button>
                    </div>
                )}
                <div className="controls-row">
                    <div className="controls-left">
                        <input
                            type="text"
                            value={search}
                            onChange={e => setSearch(e.target.value)}
                            placeholder="Buscar por nombre, correo o país..."
                        />
                        <select value={country} onChange={e => setCountry(e.target.value)}>
                            <option value="all">Todos los países</option>
                            {countries.map(pais => <option key={pais} value={pais}>{pais}</option>)}
                        </select>
                    </div>
                    <div className="table-actions">
                        <select id="exportFormat" className="btn-small secondary" style={{ marginRight: 8 }}>
                            <option value="csv">CSV</option>
                            <option value="xls">XLS</option>
                            <option value="pdf">PDF</option>
                            <option value="word">Word</option>
                        </select>
                        <button type="button" className="btn-small secondary" onClick={() => handleExport(document.getElementById("exportFormat").value)}>Exportar</button>
                        <button type="button" className="btn-small primary" onClick={() => { resetForm(); showMessage("Formulario listo para nuevo registro.", "success"); }}>Nuevo registro</button>
                    </div>
                </div>
                <div className="table-wrapper">
                    <div className={`loading-overlay ${loading ? "show" : ""}`}><div className="loading-spinner"></div></div>
                    <table>
                        <thead>
                            <tr>
                                <th><span className={headerClasses("id")} onClick={() => handleSort("id")}>ID</span></th>
                                <th><span className={headerClasses("nombres")} onClick={() => handleSort("nombres")}>Nombre</span></th>
                                <th><span className={headerClasses("apellidos")} onClick={() => handleSort("apellidos")}>Apellidos</span></th>
                                <th><span className={headerClasses("correo")} onClick={() => handleSort("correo")}>Correo</span></th>
                                <th><span className={headerClasses("ciudad")} onClick={() => handleSort("ciudad")}>Ciudad</span></th>
                                <th><span className={headerClasses("pais")} onClick={() => handleSort("pais")}>País</span></th>
                                <th><span className={headerClasses("telefono")} onClick={() => handleSort("telefono")}>Tel</span></th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody>
                            {currentPageData.length === 0 ? (
                                <tr className="no-data-row"><td colSpan="8">No hay registros que coincidan con los filtros.</td></tr>
                            ) : currentPageData.map(d => (
                                <tr key={d.id}>
                                    <td data-label="ID"><strong>{d.id}</strong></td>
                                    <td data-label="Nombre">{d.nombres}</td>
                                    <td data-label="Apellidos">{d.apellidos}</td>
                                    <td data-label="Correo">{d.correo}</td>
                                    <td data-label="Ciudad">{d.ciudad}</td>
                                    <td data-label="País">{d.pais}</td>
                                    <td data-label="Tel">{d.telefono || "N/A"}</td>
                                    <td data-label="Acciones">
                                        <button type="button" className="btn-action edit" onClick={() => handleEdit(d)} title="Editar">✎</button>
                                        <button type="button" className="btn-action delete" onClick={() => handleDelete(d.id)} title="Eliminar">✖</button>
                                    </td>
                                </tr>
                            ))}
                        </tbody>
                    </table>
                </div>
                <div id="paginationContainer" style={{ display: filteredData.length > registrosPorPagina ? "flex" : "none" }}>
                    <button type="button" className="page-btn" onClick={() => setPage(prev => Math.max(1, prev - 1))} disabled={page === 1}>‹</button>
                    <span id="pageInfo">{page} / {totalPages}</span>
                    <button type="button" className="page-btn" onClick={() => setPage(prev => Math.min(totalPages, prev + 1))} disabled={page === totalPages}>›</button>
                </div>
            </div>
            <div className="form-card" id="formCard">
                <p className="form-note">{editing ? "Editar registro" : "Nuevo registro"}</p>
                <form className="grid-form" onSubmit={handleSubmit}>
                    <input type="hidden" value={formData.id} />
                    <div>
                        <input id="nombres" type="text" value={formData.nombres} onChange={e => setFormData(prev => ({ ...prev, nombres: e.target.value }))} placeholder="Nombres" className={invalidFields.nombres ? "invalid" : ""} />
                    </div>
                    <div>
                        <input id="apellidos" type="text" value={formData.apellidos} onChange={e => setFormData(prev => ({ ...prev, apellidos: e.target.value }))} placeholder="Apellidos" className={invalidFields.apellidos ? "invalid" : ""} />
                    </div>
                    <div>
                        <input id="correo" type="email" value={formData.correo} onChange={e => setFormData(prev => ({ ...prev, correo: e.target.value }))} placeholder="Correo electrónico" className={invalidFields.correo ? "invalid" : ""} />
                    </div>
                    <div>
                        <input id="ciudad" type="text" value={formData.ciudad} onChange={e => setFormData(prev => ({ ...prev, ciudad: e.target.value }))} placeholder="Ciudad" className={invalidFields.ciudad ? "invalid" : ""} />
                    </div>
                    <div>
                        <input id="pais" type="text" value={formData.pais} onChange={e => setFormData(prev => ({ ...prev, pais: e.target.value }))} placeholder="País" className={invalidFields.pais ? "invalid" : ""} />
                    </div>
                    <div>
                        <input id="telefono" type="text" value={formData.telefono} onChange={e => setFormData(prev => ({ ...prev, telefono: e.target.value }))} placeholder="WhatsApp / Teléfono" className={invalidFields.telefono ? "invalid" : ""} />
                    </div>
                    <div className="actions-row">
                        <button type="button" className="btn-small secondary" onClick={() => { resetForm(); showMessage("Campos limpiados.", "success"); }}>Limpiar</button>
                        <button type="submit" className="btn-submit">{editing ? "Actualizar Registro" : "Guardar Registro"}</button>
                    </div>
                </form>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AdminPanel />);
</script>

</body>
</html>
