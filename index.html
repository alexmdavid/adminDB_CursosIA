<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Admin - Docentes</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background: #f5f5f5;
        }

        h1 {
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ddd;
            text-align: center;
        }

        th {
            background: #333;
            color: white;
        }

        button {
            padding: 5px 10px;
            margin: 2px;
            cursor: pointer;
        }

        .edit { background: orange; }
        .delete { background: red; color: white; }

        form {
            margin-top: 20px;
            background: white;
            padding: 20px;
        }

        input {
            margin: 5px;
            padding: 5px;
        }
    </style>
</head>
<body>

<h1>Panel de Administración</h1>

<table id="tablaDocentes">
    <thead>
        <tr>
            <th>ID</th>
            <th>Nombre</th>
            <th>Apellidos</th>

            <th>Correo</th>
        
            <th>Ciudad</th>
            <th>País</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<form id="formDocente">
    <h3>Crear / Editar Docente</h3>
    <input type="hidden" id="id">
    <input type="text" id="nombres" placeholder="Nombre" required>
    <input type="text" id="apellidos" placeholder="Apellidos" required>
    <input type="text" id="correo" placeholder="Correo" required>

    <input type="text" id="ciudad" placeholder="Ciudad" required>
    <input type="text" id="pais" placeholder="País" required>
    <button type="submit">Guardar</button>
</form>

<script>
const API = "https://curso-ia-back-cursos-ia.nsueba.easypanel.host/api/Docentes"; 

async function cargarDocentes() {
    const res = await fetch(API);
    const data = await res.json();

    const tbody = document.querySelector("#tablaDocentes tbody");
    tbody.innerHTML = "";

    data.forEach(d => {
        tbody.innerHTML += `
            <tr>
                <td>${d.id}</td>
                <td>${d.nombres}</td>
                <td>${d.apellidos}</td>
                <td>${d.correo}</td>
                <td>${d.ciudad}</td>
                <td>${d.pais}</td>
                <td>
                    <button class="edit" onclick='editar(${JSON.stringify(d)})'>Editar</button>
                    <button class="delete" onclick="eliminar(${d.id})">Eliminar</button>
                </td>
            </tr>
        `;
    });
}

function editar(d) {
    document.getElementById("id").value = d.id;
    document.getElementById("nombres").value = d.nombres;
    document.getElementById("apellidos").value = d.apellidos;
    document.getElementById("correo").value = d.correo;
    document.getElementById("ciudad").value = d.ciudad;
    document.getElementById("pais").value = d.pais;
}

async function eliminar(id) {
    if (!confirm("¿Eliminar docente?")) return;

    await fetch(`${API}/${id}`, { method: "DELETE" });
    cargarDocentes();
}

document.getElementById("formDocente").addEventListener("submit", async e => {
    e.preventDefault();

    const id = document.getElementById("id").value;

    const docente = {
        nombres: document.getElementById("nombres").value,
        apellidos: document.getElementById("apellidos").value,
        correo: document.getElementById("correo").value,
        ciudad: document.getElementById("ciudad").value,
        pais: document.getElementById("pais").value,
        telefono: "000",
        institucion: "N/A",
        cargo: "N/A",
        areaEnsenanza: "N/A",
        nivelEducativo: "N/A",
        aceptaComunicaciones: true
    };

    if (id) {
        await fetch(`${API}/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(docente)
        });
    } else {
        await fetch(API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(docente)
        });
    }

    document.getElementById("formDocente").reset();
    cargarDocentes();
});

cargarDocentes();
</script>

</body>
</html>
