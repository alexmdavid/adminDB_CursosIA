<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Playdiom</title>
    <style>
        :root {
            --primary-green: #00a884;
            --dark-bg: #075e54;
            --light-gray: #f0f4f3;
            --white: #ffffff;
            --text-dark: #2c3e50;
        }

        body { font-family: 'Segoe UI', Roboto, sans-serif; background-color: var(--light-gray); margin: 0; padding: 15px; display: flex; justify-content: center; }

        .admin-container { width: 100%; max-width: 1200px; background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        h1 { color: var(--primary-green); text-align: center; font-size: 1.6rem; margin-bottom: 20px; font-weight: 800; }

        /* Tabla Responsiva Refinada */
        .table-wrapper { overflow-x: auto; margin-bottom: 20px; border: 1px solid #eee; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { background-color: #f8faf9; color: var(--text-dark); padding: 14px; font-size: 0.75rem; text-transform: uppercase; border-bottom: 2px solid var(--primary-green); }
        td { padding: 12px; border-bottom: 1px solid #f1f1f1; text-align: center; font-size: 0.85rem; color: #555; }
        tr:hover { background-color: #f9fdfc; }

        /* Paginación Minimalista */
        #paginationContainer { display: none; justify-content: center; align-items: center; gap: 10px; margin: 15px 0; }
        .page-btn { 
            width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
            background: white; color: var(--primary-green); border: 1px solid var(--primary-green); 
            border-radius: 50%; cursor: pointer; font-size: 0.9rem; transition: 0.3s;
        }
        .page-btn:hover:not(:disabled) { background: var(--primary-green); color: white; }
        .page-btn:disabled { border-color: #ccc; color: #ccc; cursor: not-allowed; }
        #pageInfo { font-size: 0.8rem; font-weight: 600; color: var(--dark-bg); }

        /* Acciones Pequeñas */
        .btn-action { padding: 5px 8px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.8rem; transition: 0.2s; margin: 0 2px; }
        .edit { background-color: #fff3cd; color: #856404; }
        .delete { background-color: #f8d7da; color: #721c24; }
        .btn-action:hover { transform: scale(1.1); }

        /* Formulario Grid */
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; padding: 25px; background: #fafafa; border-radius: 15px; }
        input { padding: 12px; border: 1.5px solid #e0e6e4; border-radius: 10px; outline: none; font-size: 0.9rem; }
        input:focus { border-color: var(--primary-green); background: white; }
        .btn-submit { grid-column: span 2; background-color: var(--primary-green); color: white; padding: 14px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-submit:hover { background-color: var(--dark-bg); }

        @media (max-width: 600px) {
            .grid-form { grid-template-columns: 1fr; }
            .btn-submit { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>Panel de Administración</h1>

    <div class="table-wrapper">
        <table id="tablaDocentes">
            <thead>
                <tr>
                    <th>ID</th><th>Nombre</th><th>Apellidos</th><th>Correo</th><th>Ciudad</th><th>País</th><th>Tel</th><th>Acciones</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <div id="paginationContainer">
        <button class="page-btn" id="prevBtn" onclick="cambiarPagina(-1)">‹</button>
        <span id="pageInfo">Página 1</span>
        <button class="page-btn" id="nextBtn" onclick="cambiarPagina(1)">›</button>
    </div>

    <form id="formDocente" class="grid-form">
        <input type="hidden" id="id">
        <input type="text" id="nombres" placeholder="Nombres" required>
        <input type="text" id="apellidos" placeholder="Apellidos" required>
        <input type="email" id="correo" placeholder="Correo electrónico" required>
        <input type="text" id="ciudad" placeholder="Ciudad" required>
        <input type="text" id="pais" placeholder="País" required>
        <input type="text" id="telefono" placeholder="WhatsApp / Teléfono">
        <button type="submit" class="btn-submit">Guardar Registro</button>
    </form>
</div>

<script>
    const API = "https://curso-ia-back-cursos-ia.nsueba.easypanel.host/api/Docentes"; 
    let docentes = [];
    let paginaActual = 1;
    const registrosPorPagina = 15;

    async function cargarDocentes() {
        const res = await fetch(API);
        docentes = await res.json();
        renderizarTabla();
    }

    function renderizarTabla() {
        const tbody = document.querySelector("#tablaDocentes tbody");
        tbody.innerHTML = "";
        
        const inicio = (paginaActual - 1) * registrosPorPagina;
        const fin = inicio + registrosPorPagina;
        const datosPagina = docentes.slice(inicio, fin);

        datosPagina.forEach(d => {
            tbody.innerHTML += `
                <tr>
                    <td><strong>${d.id}</strong></td>
                    <td>${d.nombres}</td>
                    <td>${d.apellidos}</td>
                    <td>${d.correo}</td>
                    <td>${d.ciudad}</td>
                    <td>${d.pais}</td>
                    <td>${d.telefono || "N/A"}</td>
                    <td>
                        <button class="btn-action edit" onclick='editar(${JSON.stringify(d)})' title="Editar">✎</button>
                        <button class="btn-action delete" onclick="eliminar(${d.id})" title="Eliminar">✖</button>
                    </td>
                </tr>
            `;
        });

        // Lógica de visibilidad de paginación
        const totalPaginas = Math.ceil(docentes.length / registrosPorPagina);
        const paginacion = document.getElementById("paginationContainer");
        
        if (docentes.length > registrosPorPagina) {
            paginacion.style.display = "flex";
            document.getElementById("pageInfo").innerText = `${paginaActual} / ${totalPaginas}`;
            document.getElementById("prevBtn").disabled = paginaActual === 1;
            document.getElementById("nextBtn").disabled = paginaActual === totalPaginas;
        } else {
            paginacion.style.display = "none";
        }
    }

    function cambiarPagina(direccion) {
        paginaActual += direccion;
        renderizarTabla();
    }

    function editar(d) {
        document.getElementById("id").value = d.id;
        document.getElementById("nombres").value = d.nombres;
        document.getElementById("apellidos").value = d.apellidos;
        document.getElementById("correo").value = d.correo;
        document.getElementById("ciudad").value = d.ciudad;
        document.getElementById("pais").value = d.pais;
        document.getElementById("telefono").value = d.telefono || "";
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    async function eliminar(id) {
        if (!confirm("¿Eliminar este registro?")) return;
        await fetch(`${API}/${id}`, { method: "DELETE" });
        await cargarDocentes();
    }

    document.getElementById("formDocente").addEventListener("submit", async e => {
        e.preventDefault();
        const id = document.getElementById("id").value;
        const docente = {
            nombres: document.getElementById("nombres").value,
            apellidos: document.getElementById("apellidos").value,
            correo: document.getElementById("correo").value,
            ciudad: document.getElementById("ciudad").value,
            pais: document.getElementById("pais").value,
            telefono: document.getElementById("telefono").value || "000",
            institucion: "N/A", cargo: "N/A", areaEnsenanza: "N/A", nivelEducativo: "N/A", aceptaComunicaciones: true
        };

        const method = id ? "PUT" : "POST";
        const url = id ? `${API}/${id}` : API;

        await fetch(url, {
            method: method,
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(docente)
        });

        document.getElementById("formDocente").reset();
        document.getElementById("id").value = "";
        await cargarDocentes();
    });

    cargarDocentes();
</script>

</body>
</html>
